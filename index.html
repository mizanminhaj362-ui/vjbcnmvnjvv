<style>

/* 🌌 GLOBAL */
html {
  font-size: clamp(14px, 2.5vw, 18px);
}

body {
  margin: 0;
  padding: 0;
  background: #020617;
  font-family: 'Poppins', sans-serif;
  color: #e2e8f0;
  text-align: center;
  line-height: 1.5;
  -webkit-text-size-adjust: 100%;
}

h1 { font-size: clamp(22px, 5vw, 36px); }
h2 { font-size: clamp(18px, 4.5vw, 26px); }
p  { font-size: clamp(14px, 3.5vw, 16px); }

button{
  font-size: clamp(13px, 3.5vw, 16px);
  -webkit-tap-highlight-color: transparent;
  outline: none;
}

/* LOADER */
#loader{
  position: fixed;
  inset: 0;
  background: #020617;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.loader-box{width:80%;max-width:300px;}

.loader-text{
  font-family:'Orbitron',sans-serif;
  color:#00f5ff;
  font-size: clamp(12px,3vw,14px);
  margin-bottom:15px;
  letter-spacing:2px;
}

.bar{
  width:100%;
  height:10px;
  background:#111827;
  border-radius:50px;
  overflow:hidden;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00f5ff,#0ea5e9);
  animation:load 2s ease forwards;
}

@keyframes load{ to{width:100%} }

/* HEADER */
header{
  padding:20px;
  font-family:'Orbitron',sans-serif;
  font-size: clamp(20px, 6vw, 34px);
  color:#00f5ff;
  text-shadow:0 0 15px #00f5ff;
  border-bottom:2px solid #00f5ff;
}

/* LOGO */
.logo{
  font-size: clamp(35px, 12vw, 80px);
  margin:15px 0;
}

/* CARD */
.card{
  background:rgba(0,245,255,0.05);
  border:1px solid rgba(0,245,255,0.2);
  margin:20px auto;
  padding:25px;
  max-width:500px;
  border-radius:15px;
}

.card h2{
  font-size: clamp(16px, 4.5vw, 22px);
}

/* FADE UI */
header, .card, .logo{
  opacity:0;
  transform:translateY(20px);
}

.show-ui header,
.show-ui .logo,
.show-ui .card{
  animation:fadeUp 0.5s ease forwards;
}

@keyframes fadeUp{
  to{opacity:1; transform:translateY(0);}
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  transition:0.25s;
  color:white;
}

button:hover{
  transform:scale(1.05);
  filter:brightness(1.2);
}

button:active{
  transform:scale(0.97);
}

/* MAIN BTN */
.main-btn{
  background:linear-gradient(45deg,#00f5ff,#0ea5e9);
  color:black;
  box-shadow:0 0 20px rgba(0,245,255,0.6);
}

/* SOCIAL */
.fb{background:#1877F2; box-shadow:0 0 25px rgba(24,119,242,0.7);}
.yt{background:#FF0000; box-shadow:0 0 25px rgba(255,0,0,0.7);}
.tg{background:#0088cc; box-shadow:0 0 25px rgba(0,136,204,0.7);}

/* POPUP */
.popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.popup.show{display:flex;}

.popup-box{
  background:#111827;
  width:90%;
  max-width:350px;
  padding:25px;
  border-radius:12px;
}

/* POPUP BUTTON ANIMATION */
.popup-box button{
  opacity:0;
  transform:translateY(40px);
}

.popup.show .popup-box button{
  animation: popUp 0.5s ease forwards;
}

@keyframes popUp{
  0%{opacity:0; transform:translateY(40px);}
  100%{opacity:1; transform:translateY(0);}
}

/* STAGGER */
.popup.show .popup-box button:nth-of-type(1){animation-delay:0.1s;}
.popup.show .popup-box button:nth-of-type(2){animation-delay:0.25s;}
.popup.show .popup-box button:nth-of-type(3){animation-delay:0.4s;}
.popup.show .popup-box button:nth-of-type(4){animation-delay:0.55s;}

/* POPUP BTN COLORS */
.popup-box button:not(.setup-btn):not(.close-btn){
  background:linear-gradient(45deg,#00f5ff,#0ea5e9);
  color:black;
  box-shadow:0 0 18px rgba(0,245,255,0.9);
}

.setup-btn{
  background:linear-gradient(45deg,#a855f7,#6366f1);
  box-shadow:0 0 18px rgba(168,85,247,0.9);
}

.close-btn{
  background:#ff0000;
  box-shadow:0 0 18px rgba(255,0,0,0.9);
}

/* FOOTER */
footer{
  margin-top:30px;
  padding:15px;
  font-size: clamp(12px, 3vw, 14px);
  opacity:0.7;
}

</style>
</head>
